<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FA2M — Administration</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#060d18">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body data-page="login" class="login-body">

<div class="login-bg" aria-hidden="true">
  <div class="login-bg-glow login-bg-glow-1"></div>
  <div class="login-bg-glow login-bg-glow-2"></div>
</div>

<main class="login-wrap" role="main">

  <div class="login-card" role="region" aria-labelledby="login-title">

    <!-- Logo -->
    <div class="login-logo" aria-label="FA2M Administration">
      <span class="login-logo-text">FA<span>2</span>M</span>
      <div class="login-logo-dot" aria-hidden="true"></div>
    </div>

    <h1 id="login-title" class="login-title">Administration</h1>
    <p class="login-subtitle">Connectez-vous pour accéder au tableau de bord.</p>

    <!-- Error message -->
    <div
      id="login-error"
      class="login-error"
      role="alert"
      aria-live="assertive"
      style="display:none"
    ></div>

    <!-- Login Form -->
    <form
      id="login-form"
      class="login-form"
      novalidate
      autocomplete="on"
      aria-label="Formulaire de connexion"
    >
      <div class="form-group">
        <label for="username" class="form-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/>
          </svg>
          Identifiant
        </label>
        <input
          id="username"
          name="username"
          type="text"
          class="form-control"
          placeholder="admin"
          required
          autocomplete="username"
          aria-required="true"
          aria-describedby="login-error"
          spellcheck="false"
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          Mot de passe
        </label>
        <div class="password-wrap">
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            aria-required="true"
          >
          <button
            type="button"
            class="password-toggle"
            aria-label="Afficher / masquer le mot de passe"
            onclick="togglePasswordVisibility()"
          >
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
        </svg>
        Se connecter
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      <span class="login-version">FA2M Admin v2.0</span>
      <span class="login-secure">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
        </svg>
        Connexion sécurisée
      </span>
    </div>

  </div>

  <!-- Back to shop link -->
  <a href="../user/index.html" class="back-to-shop" aria-label="Retour à la boutique">
    ← Retour à la boutique
  </a>

</main>

<!-- Admin Toast -->
<div id="admin-toast" class="admin-toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

<script>
  function togglePasswordVisibility() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  }
</script>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
